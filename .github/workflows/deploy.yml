name: Deploy La Pince to Hetzner

# Déclencheur : Exécute le workflow à chaque push sur la branche principale
on:
  push:
    branches:
      - main # Modifie par 'master' si c'est le nom de ta branche principale

jobs:
  deploy:
    name: Déploiement automatisé sur le serveur Hetzner
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupération du code source depuis le dépôt GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape 2 : Connexion SSH au serveur et déploiement avec Docker Compose
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/lapince
            
            # Effacement complet de l'état des portes pour éviter toute interférence
            git fetch origin main
            git reset --hard origin/main
            
            # Utilisation du fichier prod pour rétrograder les conteneurs
            # Utilisation de --remove-orphans pour supprimer les conteneurs supplémentaires comme lapince-studio-1
            docker compose -f docker-compose.prod.yml --env-file .env down --remove-orphans
            sleep 2
            
            # Relance avec la nouvelle version
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build