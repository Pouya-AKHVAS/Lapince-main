name: Deploy La Pince to Hetzner

# Déclencheur : Exécute le workflow à chaque push sur la branche principale
on:
  push:
    branches:
      - main # Modifie par 'master' si c'est le nom de ta branche principale

jobs:
  deploy:
    name: Déploiement automatisé sur le serveur Hetzner
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupération du code source depuis le dépôt GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape 2 : Connexion SSH au serveur et déploiement avec Docker Compose
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/lapince
            
            # Vérification si le dépôt Git est déjà initialisé sur le serveur
            if [ ! -d ".git" ]; then
              echo "Premier déploiement : Clonage du dépôt..."
              git clone https://github.com/${{ github.repository }}.git .
            else
              echo "Mise à jour du code : Git pull en cours..."
              git pull origin main
            fi
            
            # Relance des conteneurs Docker avec reconstruction des images (Build)
            echo "Arrêt des conteneurs existants..."
            docker compose down
            
            echo "Lancement du build et démarrage des services en arrière-plan..."
            docker compose up -d --build