name: Deploy La Pince to Hetzner

# Déclencheur : Exécute le pipeline à chaque push sur la branche principale
on:
  push:
    branches:
      - main

jobs:
  # Job 1 : Test de l'application (API et Client)
  test:
    name: Tests Unitaires & Intégration
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
    
    steps:
      # Récupération du code source
      - name: Checkout code
        uses: actions/checkout@v4
        
      # Configuration de l'environnement Node.js avec mise en cache pour accélérer l'installation
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            src/api/package-lock.json
            src/client/package-lock.json

      # Installation et exécution des tests pour l'API
      - name: Install & Test API
        run: |
          npm install
          npm test
        working-directory: ./src/api
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: test
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}

      # Installation et exécution des tests pour le Client
      - name: Install & Test Client
        run: |
          npm install
          npm test
        working-directory: ./src/client

  # Job 2 : Déploiement sur le serveur (uniquement si les tests réussissent)
  deploy:
    name: Déploiement en Production
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true # Arrête le pipeline en cas d'erreur sur le serveur
          script: |
            cd /var/www/lapince
            
            # Mise à jour du code depuis le dépôt distant
            git fetch origin main
            git reset --hard origin/main
            
            # Redémarrage propre des conteneurs Docker
            # L'option --remove-orphans supprime les anciens conteneurs inutilisés
            docker compose -f docker-compose.prod.yml --env-file .env down --remove-orphans
            
            # Relance des services avec reconstruction des images si nécessaire
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build