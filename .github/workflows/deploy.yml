name: Deploy La Pince to Hetzner

# Déclencheur : Exécute ce pipeline à chaque push sur la branche principale
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Déploiement automatisé sur le serveur Hetzner
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupération du code source depuis le dépôt GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape 2 : Installation et Tests pour l'API (Back-end)
      - name: Install dependencies (API)
        run: npm install
        working-directory: ./src/api
      - name: Run Tests (API)
        run: npm test
        working-directory: ./src/api

      # Étape 3 : Installation et Tests pour le Client (Front-end)
      - name: Install dependencies (Client)
        run: npm install
        working-directory: ./src/client
      - name: Run Tests (Client)
        run: npm test
        working-directory: ./src/client

      # Étape 4 : Connexion SSH au serveur et déploiement avec Docker Compose
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Accès au répertoire de l'application sur le serveur
            cd /var/www/lapince
            
            # Mise à jour du code source depuis le dépôt distant
            git fetch origin main
            git reset --hard origin/main
            
            # Arrêt et suppression des conteneurs obsolètes pour repartir sur une base saine
            # L'option --remove-orphans nettoie les services qui ne sont plus définis
            docker compose -f docker-compose.prod.yml --env-file .env down --remove-orphans
            sleep 2
            
            # Déploiement de la nouvelle version en mode détaché
            # L'option --build force la reconstruction des images pour intégrer les modifications
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build